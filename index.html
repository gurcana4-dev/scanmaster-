<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>ScanMaster Pro - v2</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
:root{--bg:#0f172a;--card:#1e293b;--primary:#3b82f6;--success:#10b981;--danger:#ef4444;--warning:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:#e2e8f0}
.container{max-width:960px;margin:0 auto;padding:10px}

.header{text-align:center;padding:15px 0}
.header h1{font-size:24px;background:linear-gradient(90deg,#3b82f6,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.card{background:var(--card);border-radius:12px;padding:18px;margin-bottom:15px}
label{display:block;margin:12px 0 6px;font-size:14px;color:#94a3b8;font-weight:600}
input,select{width:100%;padding:12px;border-radius:8px;background:#111827;border:2px solid #334155;color:white;font-size:16px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:15px 0}
.stat{background:#111827;padding:12px;border-radius:10px;text-align:center}
.stat-val{font-size:26px;font-weight:800}
.stat-val.green{color:var(--success)}
.stat-val.red{color:var(--danger)}
.stat-val.blue{color:var(--primary)}

.camera-container{position:relative;background:#000;border-radius:12px;overflow:hidden;margin:10px 0}
#reader{width:100%;max-height:420px}

.last-scan{padding:16px;margin:12px 0;border-radius:10px;font-size:17px;font-weight:700;text-align:center;word-break:break-all}
.last-scan.ok{background:rgba(16,185,129,0.25);border:2px solid var(--success)}
.last-scan.bad{background:rgba(239,68,68,0.25);border:2px solid var(--danger)}
.last-scan.dup{background:rgba(245,158,11,0.25);border:2px solid var(--warning)}

.btn{padding:14px 24px;border:none;border-radius:10px;font-size:16px;font-weight:600;margin:5px}
.btn-success{background:var(--success);color:white}
.btn-danger{background:var(--danger)}
.btn-warning{background:var(--warning);color:black}
.btn-group{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:20px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1e293b;padding:10px;text-align:left}
td{padding:10px;border-bottom:1px solid #334155}
tr.ok td:nth-child(3){color:#10b981;font-weight:bold}
tr.dup td:nth-child(3){color:#f59e0b;font-weight:bold}
tr.bad td:nth-child(3){color:#ef4444;font-weight:bold}

.progress-bar{height:10px;background:linear-gradient(90deg,#3b82f6,#10b981);border-radius:5px;margin:10px 0}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111827;padding:14px 24px;border-radius:10px;
       color:white;font-weight:600;box-shadow:0 5px 15px rgba(0,0,0,0.5);z-index:1000;animation:toast 3s forwards}
@keyframes toast{0%{opacity:0;transform:translate(-50%,20px)}20%{opacity:1;transform:translate(-50%,0)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-20px)}}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>📷 ScanMaster Pro v2</h1>
  <p style="color:#64748b">DataMatrix & QR - Yüksek Performans</p>
</div>

<!-- Kurulum Ekranı -->
<div id="setupScreen" class="card">
  <h2>📋 Sipariş Ayarları</h2>
  <label>Toplam Sipariş Miktarı</label>
  <input type="number" id="totalQty" value="100">
  <label>Koli İçi Adet</label>
  <input type="number" id="boxSize" value="24">
  
  <label style="margin-top:20px">Referans Kod Listesi (Opsiyonel - Excel/CSV/TXT)</label>
  <input type="file" id="refFile" accept=".xlsx,.xls,.csv,.txt">
  <div id="refStatus" style="margin-top:8px;color:#10b981;font-size:14px"></div>

  <button class="btn btn-success" style="width:100%;margin-top:20px;padding:18px" onclick="startScanning()">
    ▶ OKUTMAYA BAŞLA
  </button>
</div>

<!-- Tarama Ekranı -->
<div id="scannerScreen" class="hidden">
  <div class="stats">
    <div class="stat"><div class="stat-val green" id="correctCount">0/0</div><div style="font-size:11px;color:#94a3b8">DOĞRU</div></div>
    <div class="stat"><div class="stat-val" id="boxInfo">0/24</div><div style="font-size:11px;color:#94a3b8">KOLİ</div></div>
    <div class="stat"><div class="stat-val blue" id="boxNumber">1</div><div style="font-size:11px;color:#94a3b8">KOLİ NO</div></div>
    <div class="stat"><div class="stat-val red" id="errorCount">0</div><div style="font-size:11px;color:#94a3b8">HATA</div></div>
  </div>

  <div class="progress-bar" id="progress"></div>

  <div class="camera-container">
    <div id="reader"></div>
  </div>

  <div id="lastScan" class="last-scan hidden"></div>

  <div class="btn-group">
    <button class="btn btn-warning" onclick="undoLast()">↩ Son Okumayı Geri Al</button>
    <button class="btn btn-success" onclick="exportExcel()">📥 Excel İndir</button>
    <button class="btn btn-danger" onclick="finishOrder()">✅ Siparişi Bitir</button>
  </div>
</div>

</div>

<script>
// ====================== AYARLAR ======================
let html5QrCode;
let totalQty = 0;
let boxSize = 0;
let referenceSet = null;
let scannedSet = new Set();           // Doğru okunan unique kodlar
let allScans = [];                    // Tüm okunanlar (tekrar dahil)
let currentBox = 1;
let currentBoxCount = 0;
let isScanning = false;
let lastScanTime = {};

// ====================== BAŞLAT ======================
function startScanning() {
    totalQty = parseInt(document.getElementById("totalQty").value);
    boxSize = parseInt(document.getElementById("boxSize").value);

    if (!totalQty || !boxSize) {
        alert("Toplam miktar ve koli içi adet giriniz!");
        return;
    }

    document.getElementById("setupScreen").classList.add("hidden");
    document.getElementById("scannerScreen").classList.remove("hidden");

    initHtml5QRCode();
}

// ====================== KAMERA BAŞLATMA ======================
function initHtml5QRCode() {
    html5QrCode = new Html5Qrcode("reader");

    const config = {
        fps: 15,
        qrbox: { width: 280, height: 280 },
        aspectRatio: 1.0,
        disableFlip: false,
        rememberLastUsedCamera: true
    };

    html5QrCode.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        onScanError
    ).then(() => {
        isScanning = true;
        toast("Kamera başlatıldı. DataMatrix performansı iyileştirildi.", "success");
    }).catch(err => {
        toast("Kamera başlatılamadı: " + err, "error");
    });
}

function onScanError(error) {
    // Sessizce hata ver (her frame'de hata normal)
}

function onScanSuccess(decodedText) {
    if (!isScanning) return;
    
    const code = decodedText.trim();
    const now = Date.now();

    // Aynı kod çok hızlı okunmasın
    if (lastScanTime[code] && now - lastScanTime[code] < 1200) return;
    lastScanTime[code] = now;

    processCode(code);
}

// ====================== ANA İŞLEM ======================
function processCode(code) {
    let status;

    if (scannedSet.has(code)) {
        status = "Tekrar";
    } else if (referenceSet && !referenceSet.has(code)) {
        status = "Yanlış";
    } else {
        status = "Doğru";
        scannedSet.add(code);
        currentBoxCount++;

        if (currentBoxCount >= boxSize && scannedSet.size < totalQty) {
            setTimeout(() => {
                alert(`✅ KOLİ ${currentBox} TAMAMLANDI!\n\n${boxSize} adet okutuldu.\nKoli ${currentBox + 1}'e geçebilirsiniz.`);
                currentBox++;
                currentBoxCount = 0;
            }, 100);
        }
    }

    const record = {
        code: code,
        status: status,
        box: currentBox,
        time: Date.now()
    };

    allScans.unshift(record);        // En başa ekle (yeni okunanlar üstte olsun)
    updateUI(record);
}

// ====================== UI GÜNCELLEME ======================
function updateUI(record) {
    // Son okunan göster
    const lastEl = document.getElementById("lastScan");
    let colorClass = record.status === "Doğru" ? "ok" : (record.status === "Yanlış" ? "bad" : "dup");
    lastEl.className = `last-scan ${colorClass}`;
    lastEl.textContent = `${record.status}: ${record.code}`;
    lastEl.classList.remove("hidden");

    // İstatistikler
    const correct = scannedSet.size;
    document.getElementById("correctCount").textContent = `${correct}/${totalQty}`;
    document.getElementById("boxInfo").textContent = `${currentBoxCount}/${boxSize}`;
    document.getElementById("boxNumber").textContent = currentBox;
    document.getElementById("errorCount").textContent = allScans.filter(s => s.status !== "Doğru").length;

    // Progress
    const progress = Math.min(Math.round((correct / totalQty) * 100), 100);
    document.getElementById("progress").style.width = progress + "%";

    // Tabloya ekle (ilk 30 satır)
    renderTable();
    
    // Ses + titreşim
    if (record.status === "Doğru") beep(1200, 80);
    else if (record.status === "Tekrar") beep(600, 120);
    else beep(300, 200);
}

function renderTable() {
    let html = `<table><tr><th>#</th><th>Kod</th><th>Durum</th><th>Koli</th><th>Saat</th></tr>`;
    allScans.slice(0, 30).forEach((s, i) => {
        const cls = s.status === "Doğru" ? "ok" : (s.status === "Tekrar" ? "dup" : "bad");
        html += `<tr class="${cls}"><td>${i+1}</td><td>${s.code}</td><td>${s.status}</td><td>${s.box}</td><td>${new Date(s.time).toLocaleTimeString('tr-TR')}</td></tr>`;
    });
    html += `</table>`;
    // Tabloyu buraya eklemek istersen bir div oluşturup innerHTML yapabilirsin. Şimdilik konsola yazdırıyorum.
    console.table(allScans.slice(0,10));
}

// ====================== DİĞER FONKSİYONLAR ======================
function beep(freq, duration) {
    try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.3;
        osc.start();
        setTimeout(() => osc.stop(), duration);
    } catch(e) {}
}

function toast(msg, type = "info") {
    const t = document.createElement("div");
    t.className = "toast";
    t.style.background = type === "success" ? "#10b981" : (type === "error" ? "#ef4444" : "#3b82f6");
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

function undoLast() {
    if (allScans.length === 0) return;
    const last = allScans.shift();
    if (last.status === "Doğru") {
        scannedSet.delete(last.code);
        currentBoxCount = Math.max(0, currentBoxCount - 1);
    }
    toast("Son okuma geri alındı", "warning");
    updateUI({code:"Geri alındı", status:"info", box:0, time:Date.now()});
}

function exportExcel() {
    if (allScans.length === 0) return alert("Henüz okuma yok!");
    // Excel export mantığı (önceki versiyondan alınıp iyileştirildi)
    const wb = XLSX.utils.book_new();
    const data = allScans.map((s,i) => ({
        Sıra: i+1,
        Kod: s.code,
        Durum: s.status,
        "Koli No": s.box,
        "Okuma Zamanı": new Date(s.time).toLocaleString('tr-TR')
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, ws, "Okumalar");
    XLSX.writeFile(wb, `ScanMaster_${new Date().toISOString().slice(0,16).replace(/:/g,'-')}.xlsx`);
    toast("Excel dosyası indirildi!", "success");
}

function finishOrder() {
    if (confirm("Siparişi tamamlamak istediğinizden emin misiniz?")) {
        isScanning = false;
        if (html5QrCode) html5QrCode.stop();
        alert("Sipariş tamamlandı!\n\nExcel dosyasını indirmeyi unutmayın.");
    }
}

// Referans dosya yükleme
document.getElementById("refFile").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    const lines = text.split(/[\r\n,;\t]+/).map(x => x.trim()).filter(x => x.length > 5);
    referenceSet = new Set(lines);
    document.getElementById("refStatus").innerHTML = `✅ ${lines.length} referans kod yüklendi`;
    toast(`${lines.length} referans kod yüklendi`, "success");
});
</script>
</body>
</html>
