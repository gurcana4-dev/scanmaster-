<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ScanMaster Pro v3 - Yüksek Performans</title>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
    :root { --bg: #0a0f1c; --card: #121a2b; --accent: #00ff9d; }
    body { margin:0; padding:0; background:var(--bg); color:#eee; font-family:Arial,sans-serif; overflow:hidden; }
    .container { max-width:1000px; margin:auto; padding:10px; }
    h1 { text-align:center; color:var(--accent); margin:10px 0 5px; }
    .card { background:var(--card); border-radius:12px; padding:15px; margin-bottom:12px; }
    
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:15px 0; }
    .stat { background:#0a0f1c; padding:10px; border-radius:10px; text-align:center; }
    .stat-val { font-size:28px; font-weight:bold; }
    .stat-val.green { color:#00ff9d; }
    
    #videoContainer { position:relative; width:100%; background:#000; border-radius:12px; overflow:hidden; }
    #video { width:100%; display:block; }
    #overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    
    .scan-area { 
        position:absolute; top:8%; left:6%; width:88%; height:84%; 
        border:3px solid var(--accent); border-radius:20px; box-shadow:0 0 0 9999px rgba(10,15,28,0.75);
        animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
    
    .last-scan { 
        margin:12px 0; padding:18px; border-radius:12px; font-size:18px; font-weight:bold; 
        text-align:center; word-break:break-all; min-height:60px;
    }
    .ok { background:#003322; border:2px solid #00ff9d; color:#00ff9d; }
    .dup { background:#332200; border:2px solid #ffaa00; color:#ffdd88; }
    .bad { background:#330000; border:2px solid #ff4444; color:#ff8888; }
    
    button { padding:14px 20px; margin:5px; border:none; border-radius:10px; font-size:16px; font-weight:bold; }
    .btn-success { background:#00cc77; color:black; }
    .btn-danger { background:#cc1122; }
    .btn-warning { background:#ffaa00; color:black; }
    
    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#000; color:#0f0; 
             padding:15px 25px; border-radius:10px; font-weight:bold; z-index:9999; box-shadow:0 0 20px #0f0; }
</style>
</head>
<body>

<div class="container">
    <h1>SCANMASTER PRO v3</h1>
    <p style="text-align:center;color:#00cc88;margin-bottom:15px;">Büyük Alan • Çoklu Okuma • Yüksek Hız</p>

    <!-- Kurulum -->
    <div id="setup" class="card">
        <label>Toplam Sipariş Adedi</label>
        <input type="number" id="total" value="500" style="width:100%;padding:12px;font-size:18px;">
        <label>Koli İçi Adet</label>
        <input type="number" id="boxsize" value="24" style="width:100%;padding:12px;font-size:18px;">
        
        <label style="margin-top:15px">Referans Kod Listesi (Excel/CSV/TXT - Opsiyonel)</label>
        <input type="file" id="refInput" accept=".xlsx,.xls,.csv,.txt">
        
        <button onclick="start()" style="width:100%;margin-top:20px;padding:18px;font-size:18px;" class="btn-success">
            KAMERAYI BAŞLAT
        </button>
    </div>

    <!-- Tarama Ekranı -->
    <div id="scanner" class="hidden">
        <div class="stats">
            <div class="stat"><div class="stat-val green" id="correct">0/0</div><small>DOĞRU</small></div>
            <div class="stat"><div class="stat-val" id="currentBox">0/24</div><small>BU KOLİ</small></div>
            <div class="stat"><div class="stat-val" id="boxNo">1</div><small>KOLİ NO</small></div>
            <div class="stat"><div class="stat-val" id="error">0</div><small>HATA/TEKRAR</small></div>
        </div>

        <div id="videoContainer">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
            <div class="scan-area"></div>
        </div>

        <div id="lastScan" class="last-scan hidden"></div>

        <div style="text-align:center;margin-top:10px">
            <button onclick="togglePause()" id="pauseBtn" class="btn-warning">⏸ DURAKLAT</button>
            <button onclick="exportExcel()" class="btn-success">📥 EXCEL İNDİR</button>
            <button onclick="finish()" class="btn-danger">✅ BİTİR</button>
        </div>
    </div>
</div>

<script>
// ====================== Zxing Tabanlı Güçlü Tarayıcı ======================
let codeReader, videoElement, canvasElement, ctx;
let totalQty = 0, boxSize = 0, currentBox = 1, currentBoxCount = 0;
let referenceSet = null;
let scannedSet = new Set();
let allScans = [];
let isPaused = false;
let lastDetected = new Map();

const hints = new Map();
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.DATA_MATRIX,
    ZXing.BarcodeFormat.QR_CODE,
    ZXing.BarcodeFormat.CODE_128
]);
hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
hints.set(ZXing.DecodeHintType.PURE_BARCODE, false);

async function start() {
    totalQty = parseInt(document.getElementById("total").value);
    boxSize = parseInt(document.getElementById("boxsize").value);

    document.getElementById("setup").classList.add("hidden");
    document.getElementById("scanner").classList.remove("hidden");

    videoElement = document.getElementById("video");
    canvasElement = document.getElementById("overlay");
    ctx = canvasElement.getContext("2d");

    codeReader = new ZXing.BrowserMultiFormatReader(hints);

    try {
        const devices = await codeReader.listVideoInputDevices();
        const backCamera = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length-1];
        
        await codeReader.decodeFromVideoDevice(backCamera.deviceId, videoElement, (result, err) => {
            if (isPaused || !result) return;
            processResult(result.getText());
        });

        // Video yüklendikten sonra canvas boyutunu ayarla
        videoElement.onloadedmetadata = () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
        };

        toast("Tarayıcı başlatıldı. Büyük alan ve çoklu okuma aktif.", "#00ff9d");
    } catch (err) {
        toast("Kamera hatası: " + err.message, "#ff4444");
    }
}

function processResult(rawCode) {
    const code = rawCode.trim();
    const now = Date.now();

    if (lastDetected.has(code) && now - lastDetected.get(code) < 800) return;
    lastDetected.set(code, now);

    let status = "Doğru";

    if (scannedSet.has(code)) {
        status = "Tekrar";
    } else if (referenceSet && !referenceSet.has(code)) {
        status = "Yanlış";
    } else {
        scannedSet.add(code);
        currentBoxCount++;
        
        if (currentBoxCount >= boxSize && scannedSet.size < totalQty) {
            setTimeout(() => {
                alert(`🎉 KOLİ ${currentBox} TAMAMLANDI!\n${boxSize} adet okutuldu.\n\nKoli ${currentBox+1} başlıyor.`);
                currentBox++;
                currentBoxCount = 0;
            }, 100);
        }
    }

    const record = { code, status, box: currentBox, time: now };
    allScans.unshift(record);
    
    showLast(record);
    updateStats();
}

function showLast(record) {
    const el = document.getElementById("lastScan");
    el.className = `last-scan ${record.status === "Doğru" ? "ok" : (record.status === "Tekrar" ? "dup" : "bad")}`;
    el.textContent = `${record.status.toUpperCase()}: ${record.code}`;
    el.classList.remove("hidden");
}

function updateStats() {
    const correct = scannedSet.size;
    document.getElementById("correct").textContent = `${correct}/${totalQty}`;
    document.getElementById("currentBox").textContent = `${currentBoxCount}/${boxSize}`;
    document.getElementById("boxNo").textContent = currentBox;
    document.getElementById("error").textContent = allScans.filter(x => x.status !== "Doğru").length;
}

function togglePause() {
    isPaused = !isPaused;
    document.getElementById("pauseBtn").textContent = isPaused ? "▶ DEVAM ET" : "⏸ DURAKLAT";
}

function exportExcel() {
    if (allScans.length === 0) return alert("Henüz okuma yok!");
    
    const wb = XLSX.utils.book_new();
    const data = allScans.map((s,i) => ({
        Sıra: i+1,
        Kod: s.code,
        Durum: s.status,
        Koli: s.box,
        Zaman: new Date(s.time).toLocaleString('tr-TR')
    }));
    
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), "Tüm Okumalar");
    XLSX.writeFile(wb, `ScanMaster_${new Date().toISOString().slice(0,16).replace(/[:T]/g,'-')}.xlsx`);
    toast("Excel indirildi!", "#00ff9d");
}

function finish() {
    if (confirm("Siparişi bitirmek istiyor musunuz?")) {
        if (codeReader) codeReader.reset();
        alert("Sipariş tamamlandı. Excel dosyasını indirmeyi unutmayın.");
    }
}

function toast(msg, color) {
    const t = document.createElement("div");
    t.className = "toast";
    t.style.color = color;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

// Referans dosyası yükleme
document.getElementById("refInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const buffer = await file.arrayBuffer();
    const wb = XLSX.read(buffer);
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(sheet, {header:1});
    const codes = data.flat().map(String).map(x=>x.trim()).filter(x=>x.length>3);
    referenceSet = new Set(codes);
    toast(`${codes.length} referans kod yüklendi`, "#00ff9d");
});
</script>
</body>
</html>
